[package]
name = "blacknode-ros2"
version = "0.4.0"
description = "ROS 2 graph, topic, service, process, native, and rosbridge integration primitives."
requires-blacknode = ">=0.3.0"
layer = "ros2"
component-mode = true

[categories]
"ROS 2" = "#2e9fe6"

[components.core]
description = "Shared ROS 2 graph access that the transport and concern components build on."
default = true
capabilities = ["integration.ros2", "transport.ros2", "transport.rosbridge"]
nodes = ["nodes"]
module-root = true

[components.core.dependencies]
pip = ["PyYAML>=6", "roslibpy>=1.5", "numpy>=1.24", "pillow>=10"]
imports = ["yaml", "roslibpy", "numpy", "PIL"]
docker = ["ros:jazzy"]

# Declared for the package roadmap; sources land in components/native/nodes.
[components.native]
description = "Native rclpy transport for topics, services, and actions."
default = false
capabilities = ["transport.ros2.native"]

# Declared for the package roadmap; sources land in components/rosbridge/nodes.
[components.rosbridge]
description = "rosbridge websocket transport and server lifecycle."
default = false
capabilities = ["transport.rosbridge"]

# Declared for the package roadmap; sources land in components/topics/nodes.
node-types = [
  "ROS2BridgeEcho", "ROS2BridgePublish", "ROS2RosbridgeServer", "ROS2RosbridgeStatus"
]

[components.topics]
description = "Topic discovery, echo, and publication."
default = false
capabilities = ["integration.ros2.topics"]

# Declared for the package roadmap; sources land in components/services/nodes.
node-types = [
  "ROS2DemoPublisher", "ROS2TopicEcho", "ROS2TopicList", "ROS2TopicPublish"
]

[components.services]
description = "Service discovery and invocation."
default = false
capabilities = ["integration.ros2.services"]

# Declared for the package roadmap; sources land in components/actions/nodes.
node-types = [
  "ROS2ServiceList"
]

[components.actions]
description = "Action servers, goals, and feedback streams."
default = false
capabilities = ["integration.ros2.actions"]

# Declared for the package roadmap; sources land in components/tf/nodes.
[components.tf]
description = "Transform tree lookup and frame conversion."
default = false
capabilities = ["integration.ros2.tf"]

# Declared for the package roadmap; sources land in components/processes/nodes.
[components.processes]
description = "ros2 run/launch process supervision."
default = false
capabilities = ["integration.ros2.processes"]

# Declared for the package roadmap; sources land in components/diagnostics/nodes.
node-types = [
  "ROS2Launch", "ROS2PackageExecutables", "ROS2Run"
]

[components.diagnostics]
description = "Graph health, node lists, and status dashboards."
default = false
capabilities = ["integration.ros2.diagnostics"]
node-types = [
  "ROS2InterfaceShow", "ROS2NodeList", "ROS2Status", "ROS2SystemCheck", "ROS2VisualDashboard"
]
